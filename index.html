<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>随机密码生成器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-labelledby="page-title">
        <header class="panel-header">
          <p class="eyebrow">密码生成与加密静态工具</p>
          <h1 id="page-title">随机密码生成器</h1>
          <p class="subtitle">本地生成、立即复制，也可以输入明文并使用浏览器内置 RSA 加密。</p>
        </header>

        <section class="output-card" aria-labelledby="result-title">
          <div class="section-heading">
            <h2 id="result-title">生成结果</h2>
            <span id="strength-label" class="strength strength-weak">强度：弱</span>
          </div>

          <div class="output-row">
            <label class="sr-only" for="password-output">生成出的密码</label>
            <input
              id="password-output"
              class="password-output"
              type="text"
              readonly
              spellcheck="false"
              autocomplete="off"
            />
            <button id="copy-button" class="secondary-button" type="button">
              复制密码
            </button>
          </div>

          <p id="status-message" class="status-message" role="status" aria-live="polite">
            准备生成密码
          </p>
        </section>

        <section class="controls" aria-labelledby="settings-title">
          <div class="section-heading">
            <h2 id="settings-title">生成设置</h2>
            <button id="generate-button" class="primary-button" type="button">
              生成密码
            </button>
          </div>

          <div class="length-card">
            <div class="length-header">
              <label for="length-range">密码长度</label>
              <input
                id="length-number"
                class="length-number"
                type="number"
                min="8"
                max="64"
                value="16"
              />
            </div>
            <input
              id="length-range"
              type="range"
              min="8"
              max="64"
              value="16"
            />
            <div class="length-scale" aria-hidden="true">
              <span>8</span>
              <span>64</span>
            </div>
          </div>

          <div class="option-grid">
            <label class="option-card" for="include-lowercase">
              <input id="include-lowercase" type="checkbox" checked />
              <span>包含小写字母</span>
            </label>

            <label class="option-card" for="include-uppercase">
              <input id="include-uppercase" type="checkbox" checked />
              <span>包含大写字母</span>
            </label>

            <label class="option-card" for="include-numbers">
              <input id="include-numbers" type="checkbox" checked />
              <span>包含数字</span>
            </label>

            <label class="option-card" for="include-symbols">
              <input id="include-symbols" type="checkbox" checked />
              <span>包含特殊字符</span>
            </label>

            <label class="option-card option-card-wide" for="exclude-ambiguous">
              <input id="exclude-ambiguous" type="checkbox" />
              <span>排除易混淆字符（如 0、O、1、l、I）</span>
            </label>
          </div>
        </section>

        <section class="controls encryption-card" aria-labelledby="encryption-title">
          <div class="section-heading">
            <div>
              <h2 id="encryption-title">RSA 加密 / 解密</h2>
              <p id="rsa-key-status" class="card-note">RSA 密钥准备中...</p>
            </div>
            <button id="encrypt-button" class="primary-button" type="button">
              RSA 加密
            </button>
          </div>

          <div class="plaintext-card">
            <label for="plaintext-input">输入要加密的明文</label>
            <textarea
              id="plaintext-input"
              class="plaintext-input"
              rows="4"
              placeholder="请输入明文，点击 RSA 加密后会生成 Base64 密文"
            ></textarea>
          </div>

          <div class="cipher-output-card">
            <label class="sr-only" for="ciphertext-output">RSA 加密后的密文</label>
            <textarea
              id="ciphertext-output"
              class="ciphertext-output"
              rows="4"
              readonly
              spellcheck="false"
              placeholder="这里会显示 RSA 加密后的密文"
            ></textarea>
            <button id="copy-cipher-button" class="secondary-button" type="button">
              复制密文
            </button>
          </div>

          <div class="cipher-input-card">
            <label for="decrypt-input">输入要解密的 Base64 密文</label>
            <textarea
              id="decrypt-input"
              class="decrypt-input"
              rows="4"
              placeholder="把 RSA 加密后的 Base64 密文粘贴到这里"
            ></textarea>
          </div>

          <div class="decrypt-output-card">
            <label class="sr-only" for="decrypt-output">RSA 解密后的明文</label>
            <textarea
              id="decrypt-output"
              class="decrypt-output"
              rows="4"
              readonly
              spellcheck="false"
              placeholder="这里会显示 RSA 解密后的明文"
            ></textarea>
            <button id="decrypt-button" class="primary-button" type="button">
              RSA 解密
            </button>
            <button id="copy-decrypt-button" class="secondary-button" type="button">
              复制明文
            </button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
